<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A message for you</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #1e1e2e;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 24px 0;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      display: none;
    }

    /* ── Landing / boot screen ── */
    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: #1e1e2e;
    }

    #terminal {
      width: min(480px, 92vw);
      background: #13131f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* Fake titlebar */
    #terminal::before {
      content: '';
      display: block;
      height: 36px;
      background: #1e1e2e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background-image: radial-gradient(circle 5px at 16px 18px, #ff5f57 100%, transparent),
        radial-gradient(circle 5px at 36px 18px, #febc2e 100%, transparent),
        radial-gradient(circle 5px at 56px 18px, #28c840 100%, transparent);
    }

    #term-lines {
      padding: 20px 24px 0;
      min-height: 160px;
    }

    .term-line {
      font-size: 13px;
      color: #a0a0c0;
      line-height: 1.9;
      letter-spacing: 0.3px;
    }

    .term-line:first-child {
      color: #7c6af7;
    }

    .term-line:nth-child(3) {
      color: #28c840;
    }

    .term-line:nth-child(5) {
      color: #febc2e;
    }

    .term-line:last-child {
      color: #e0e0f0;
      font-weight: 700;
    }

    #term-cursor {
      padding: 0 24px 24px;
      font-size: 13px;
      color: #555570;
      visibility: hidden;
    }

    .cursor {
      color: #7c6af7;
      animation: blink 1s step-end infinite;
    }

    #run-btn {
      display: block;
      margin: 0 24px 24px;
      padding: 11px 0;
      width: calc(100% - 48px);
      background: transparent;
      color: #7c6af7;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid #7c6af7;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.4s ease, background 0.15s, color 0.15s, box-shadow 0.15s;
      pointer-events: none;
    }

    #run-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #run-btn:hover {
      background: #7c6af7;
      color: #fff;
      box-shadow: 0 0 20px rgba(124, 106, 247, 0.4);
    }

    #run-btn:active {
      filter: brightness(0.9);
    }

    /* ── Loading screen ── */
    #loading {
      font-size: 13px;
      color: #555570;
      letter-spacing: 1px;
    }

    #loading span {
      color: #7c6af7;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* ── Final screen ── */
    #final {
      display: none;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: min(600px, 100vw);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Timer block ── */
    #timer-block {
      width: min(380px, 92vw);
      margin: 0 auto 12px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 0 20px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #timer-block.visible {
      opacity: 1;
    }

    #timer-label {
      font-size: 11px;
      color: #8888aa;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #timer-number {
      font-size: 88px;
      font-weight: 700;
      color: #7c6af7;
      line-height: 1;
      transition: color 0.3s ease;
    }

    #timer-number.urgent {
      color: #f472b6;
    }

    #timer-sublabel {
      font-size: 11px;
      color: #555570;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ── Birthday text ── */
    #final h1 {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 52px;
      color: #e0e0f0;
      margin-top: 16px;
      line-height: 1.3;
      white-space: nowrap;
      display: inline-block;
    }

    #birthday-subtext {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #8888aa;
      margin-top: 10px;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    /* ── Birthday block (GIF + text) ── */
    #birthday-block {
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.4s forwards;
    }

    #birthday-gif {
      width: min(380px, 92vw);
      height: min(380px, 92vw);
      object-fit: contain;
      display: block;
      margin: 0 auto;
      border-radius: 16px;
    }

    /* ── Voucher block (replaces GIF after timer) ── */
    #voucher-block {
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #voucher-block.visible {
      opacity: 1;
    }

    #scratch-wrap {
      position: relative;
      width: min(380px, 92vw);
      height: min(380px, 92vw);
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      cursor: crosshair;
    }

    #scratch-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    #scratch-canvas {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      touch-action: none;
    }

    #claim-text {
      font-size: 13px;
      color: #8888aa;
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.8s ease 0.4s;
      letter-spacing: 0.5px;
    }

    #claim-text.visible {
      opacity: 1;
    }

    #claim-text::before {
      content: '// ';
      color: #7c6af7;
    }

    @media (max-width: 480px) {
      #final h1 {
        font-size: 36px;
      }
      #birthday-subtext {
        font-size: 11px;
        padding: 0 12px;
      }
      #claim-text {
        font-size: 11px;
        padding: 0 12px;
      }
      #timer-number {
        font-size: 72px;
      }
      #timer-label, #timer-sublabel {
        font-size: 10px;
      }
      .term-line {
        font-size: 12px;
      }
      #run-btn {
        font-size: 12px;
      }
    }
    </style>
</head>

<body>

  <canvas id="confetti-canvas"></canvas>
  <!-- Landing screen -->
  <div id="landing">
    <div id="terminal">
      <div id="term-lines"></div>
      <div id="term-cursor">
        <span id="term-input"></span><span class="cursor">_</span>
      </div>
      <button id="run-btn" onclick="startExperience()">[ RUN message_from_jacky.exe ]</button>
    </div>
  </div>

  <!-- Final screen -->
  <div id="final">

    <!-- Timer (fades in above GIF, fades out before voucher) -->
    <div id="timer-block">
      <div id="timer-label">your voucher unlocks in</div>
      <div id="timer-number">8</div>
      <div id="timer-sublabel">seconds...</div>
    </div>

    <!-- Image area: GIF first, replaced by voucher after timer -->
    <div id="birthday-block">
      <img id="birthday-gif" src="cake_girl_boomerang.gif" alt="birthday girl eating cake" />
    </div>

    <div id="voucher-block">
      <div id="scratch-wrap">
        <img id="present-img" src="present_photo.jpg" alt="your gift" />
        <canvas id="scratch-canvas"></canvas>
      </div>
    </div>

    <!-- Text always visible below -->
    <h1>祝你食極唔肥，年年18歲!!</h1>
    <p id="birthday-subtext">// Wishing you can eat as much as you want without gaining weight, and stay 18 forever!</p>
    <p id="claim-text">Come and claim your little gift</p>

  </div>

  <script>
    // ── Boot sequence ──
  const bootLines = [
    '> Booting message_from_jacky.exe...',
    '> Checking recipient...',
    '> Recipient: Christina ✓',
    '> Decrypting contents...',
    '> Warning: Creator takes no responsibility for quality.',
    '> Ready.',
  ];
  const CHAR_SPEED = 28;
  const LINE_GAP = 300;

  function runBoot() {
    const linesEl = document.getElementById('term-lines');
    const btn = document.getElementById('run-btn');

    let delay = 0;
    bootLines.forEach((text) => {
      setTimeout(() => typeLineIn(linesEl, text), delay);
      delay += text.length * CHAR_SPEED + LINE_GAP;
    });

    setTimeout(() => btn.classList.add('visible'), delay);
  }

  function typeLineIn(container, text) {
    const line = document.createElement('div');
    line.className = 'term-line';
    container.appendChild(line);

    let i = 0;
    const interval = setInterval(() => {
      line.textContent += text[i];
      i++;
      if (i >= text.length) clearInterval(interval);
    }, CHAR_SPEED);
  }

    function startExperience() {
      const landing = document.getElementById('landing');
      landing.style.transition = 'opacity 0.5s ease';
      landing.style.opacity = '0';
      setTimeout(() => {
        landing.style.display = 'none';
        runDialogs();
      }, 500);
    }

    runBoot();

    function runDialogs() {
      alert("Hey! Are you there?");

      const isChristina = confirm("Good Good Good! Just want to make sure.... you're Christina right?");
      if (!isChristina) {
        alert("I only talk to Christina.");
        const landing = document.getElementById('landing');
        document.getElementById('term-lines').innerHTML = '';
        document.getElementById('run-btn').classList.remove('visible');
        landing.style.display = 'flex';
        landing.style.opacity = '0';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          landing.style.transition = 'opacity 0.5s ease';
          landing.style.opacity = '1';
          runBoot();
        }));
        return;
      }

      alert("I know March is important to you. I have something to tell you....");
      alert("March is also important to ME!!!!!");

      const prepared = confirm("I told you no need to prepare anything...but you are doing it anyway, ain't you? 🙂‍↕️");
      if (!prepared) {
        const prepared2 = confirm("Huh? You already got me something?!");
        if (!prepared2) {
          alert("Sure sure... I believe you. Totally. 100%.");
        }
      }

      alert("Hahaha...I'm just joking :)");
      alert("I'm so proud of myself that I'm able to create this HAHAAHA");
      alert("Happy Birthday to you! 🥳");

      // Show final screen
      document.getElementById('final').style.display = 'block';

      // Start countdown
      startTimer();
    }

    // ── 8-second countdown then swap GIF → voucher ──
    function startTimer() {
      let count = 8;
      const numEl = document.getElementById('timer-number');
      const timerBlock = document.getElementById('timer-block');

      // Show timer block
      timerBlock.style.display = 'flex';
      requestAnimationFrame(() => requestAnimationFrame(() => timerBlock.classList.add('visible')));

      const tick = setInterval(() => {
        count--;
        numEl.textContent = count;
        if (count <= 3) numEl.classList.add('urgent');
        if (count <= 0) {
          clearInterval(tick);
          // Fade out timer block, then reveal voucher
          timerBlock.style.transition = 'opacity 0.5s ease';
          timerBlock.classList.remove('visible');
          setTimeout(revealVoucher, 500);
        }
      }, 1000);
    }

    function revealVoucher() {
      // Fade out GIF
      const gifBlock = document.getElementById('birthday-block');
      gifBlock.style.transition = 'opacity 0.5s ease';
      gifBlock.style.opacity = '0';

      setTimeout(() => {
        gifBlock.style.display = 'none';

        // Fade in voucher
        const voucherBlock = document.getElementById('voucher-block');
        voucherBlock.style.display = 'block';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            voucherBlock.classList.add('visible');
            initScratch();
          });
        });
      }, 500);
    }

    // ── Scratch card ──
    function initScratch() {
      const wrap = document.getElementById('scratch-wrap');
      const canvas = document.getElementById('scratch-canvas');
      const W = wrap.offsetWidth;
      const H = wrap.offsetHeight;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Base fill — warm cream
      ctx.fillStyle = '#fdf6ec';
      ctx.fillRect(0, 0, W, H);

      // Left tear-off strip
      ctx.fillStyle = '#f2c4ce';
      ctx.fillRect(0, 0, 48, H);
      // Right tear-off strip
      ctx.fillStyle = '#f2c4ce';
      ctx.fillRect(W - 48, 0, 48, H);

      // Perforation circles — left
      ctx.fillStyle = '#fdf6ec';
      for (let y = 12; y < H; y += 18) {
        ctx.beginPath(); ctx.arc(48, y, 6, 0, Math.PI * 2); ctx.fill();
      }
      // Perforation circles — right
      for (let y = 12; y < H; y += 18) {
        ctx.beginPath(); ctx.arc(W - 48, y, 6, 0, Math.PI * 2); ctx.fill();
      }

      // Outer dashed border
      ctx.save();
      ctx.strokeStyle = '#e8a0b0'; ctx.lineWidth = 2; ctx.setLineDash([8, 6]);
      ctx.strokeRect(64, 16, W - 128, H - 32);
      ctx.restore();

      // Inner dashed border
      ctx.save();
      ctx.strokeStyle = '#f0b8c4'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
      ctx.strokeRect(72, 24, W - 144, H - 48);
      ctx.restore();

      // GIFT VOUCHER header
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c0647a';
      ctx.font = 'bold 11px JetBrains Mono, monospace';
      ctx.fillText('— GIFT VOUCHER —', W / 2, 52);
      ctx.restore();

      // REDEEM watermark stamp
      ctx.save();
      ctx.translate(W / 2, H / 2 - 30); ctx.rotate(-0.18);
      ctx.font = 'bold 52px JetBrains Mono, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#e0607a'; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.18;
      ctx.strokeText('REDEEM', 0, 0);
      ctx.globalAlpha = 1;
      ctx.restore();

      // Main CTA text
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#7a3040';
      ctx.font = 'bold 15px JetBrains Mono, monospace';
      ctx.fillText('Scratch to redeem your gift', W / 2, H / 2 - 18);
      ctx.restore();

      // Fine print
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#b07080';
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.fillText('One-time use only  ·  Non-transferable', W / 2, H / 2 + 14);
      ctx.restore();

      // Serial number
      const serial = 'HBD-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + new Date().getFullYear();
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c0a0a8'; ctx.font = '10px JetBrains Mono, monospace';
      ctx.fillText('No. ' + serial, W / 2, H - 44);
      ctx.restore();

      // VALID: TODAY ONLY
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c0647a'; ctx.font = 'bold 10px JetBrains Mono, monospace';
      ctx.fillText('VALID: TODAY ONLY', W / 2, H - 28);
      ctx.restore();

      // Vertical strip text — left
      ctx.save();
      ctx.translate(24, H / 2); ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c0647a'; ctx.font = 'bold 9px JetBrains Mono, monospace';
      ctx.fillText('BIRTHDAY SPECIAL', 0, 0);
      ctx.restore();

      // Vertical strip text — right
      ctx.save();
      ctx.translate(W - 24, H / 2); ctx.rotate(Math.PI / 2);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c0647a'; ctx.font = 'bold 9px JetBrains Mono, monospace';
      ctx.fillText('BIRTHDAY SPECIAL', 0, 0);
      ctx.restore();

      ctx.globalCompositeOperation = 'destination-out';

      let isDrawing = false;
      let revealed = false;
      const BRUSH = 38;
      const THRESHOLD = 0.60;

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
      }

      function scratch(e) {
        if (!isDrawing || revealed) return;
        const { x, y } = getPos(e);
        ctx.beginPath(); ctx.arc(x, y, BRUSH, 0, Math.PI * 2); ctx.fill();
        checkThreshold();
      }

      function checkThreshold() {
        const data = ctx.getImageData(0, 0, W, H).data;
        let cleared = 0, total = 0;
        for (let i = 3; i < data.length; i += 16) {
          total++;
          if (data[i] < 128) cleared++;
        }
        if (cleared / total >= THRESHOLD) fullyReveal();
      }

      function fullyReveal() {
        revealed = true;
        canvas.style.transition = 'opacity 0.6s ease';
        canvas.style.opacity = '0';
        setTimeout(() => {
          canvas.style.display = 'none';
          document.getElementById('claim-text').classList.add('visible');
          launchConfetti();
        }, 600);
      }

      canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
      canvas.addEventListener('mousemove', scratch);
      canvas.addEventListener('mouseup', () => isDrawing = false);
      canvas.addEventListener('mouseleave', () => isDrawing = false);
      canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; scratch(e); }, { passive: false });
      canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
      canvas.addEventListener('touchend', () => isDrawing = false);
    }

    // ── Confetti ──
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      canvas.style.display = 'block';
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 140 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        w: 8 + Math.random() * 10,
        h: 5 + Math.random() * 6,
        color: `hsl(${45 + Math.random() * 25}, ${55 + Math.random() * 20}%, ${72 + Math.random() * 18}%)`,
        speed: 2 + Math.random() * 3.5,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.14,
        drift: (Math.random() - 0.5) * 1.8,
      }));

      let elapsed = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y); ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
          p.y += p.speed; p.x += p.drift; p.angle += p.spin;
        });
        elapsed++;
        if (elapsed < 200) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.style.display = 'none';
        }
      }
      draw();
    }
  </script>
</body>

</html>
